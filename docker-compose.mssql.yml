# Shoko Server — Microsoft SQL Server override
# Extends docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.mssql.yml up -d
#
# Credentials: put passwords in a .env file next to this file — never commit them.
#   SA_PASSWORD=YourStrong!Passw0rd   # min 8 chars, upper+lower+digit+symbol
#   docs.docker.com/compose/how-tos/environment-variables/variable-interpolation/
#
# Setup:
# 1. Start SQLite once to generate settings-server.json, then stop.
# 2. Edit settings-server.json in the shoko-config volume:
#      "DatabaseType": "SqlServer",
#      "SQLServer_DatabaseName": "ShokoServer",
#      "SQLServer_Username": "sa",
#      "SQLServer_Password": "<your SA_PASSWORD>",
#      "SQLServer_Host": "mssql"
# 3. Start the full stack with both compose files.

services:
  shoko_server:
    depends_on:
      mssql:
        condition: service_healthy

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shoko_mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD:-YourStrong!Passw0rd}"
      MSSQL_PID: Express
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mssql-data:

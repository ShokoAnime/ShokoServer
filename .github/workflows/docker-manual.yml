name: Publish to Docker Hub (Manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git Reference
        default: master
        required: true
      tag:
        description: Docker Tag
        default: daily
        required: true
      release:
        description: Release Channel
        default: dev
        required: true
      version:
        description: Application Version
        default: "0.0.0.0"
        required: true

jobs:
  webui:
    runs-on: ubuntu-latest

    name: Download Web UI

    steps:
      - name: Get Web UI Release URL
        id: webui_release
        run: |
          if [ "${{ github.event.inputs.release }}" = "stable" ]; then
            download_url=$(curl -s https://api.github.com/repos/ShokoAnime/Shoko-WebUI/releases/latest | jq -r '.assets[0].browser_download_url')
          else
            download_url=$(curl -s https://api.github.com/repos/ShokoAnime/Shoko-WebUI/releases | jq -r '.[0].assets[0].browser_download_url')
          fi
          echo "download_url=${download_url}" >> "$GITHUB_OUTPUT"

      - name: Download and Extract Web UI
        run: |
          mkdir -p webui
          curl -L "${{ steps.webui_release.outputs.download_url }}" -o webui/latest.zip
          cd webui
          unzip -o latest.zip
          rm latest.zip

      - name: Upload Web UI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui
          path: webui/
          retention-days: 1

  docker-manual-build:
    name: Publish docker image

    needs:
      - webui

    strategy:
      matrix:
        arch:
          - amd64
          - arm64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: "${{ github.event.inputs.ref }}"
          submodules: recursive
          fetch-depth: 0 # This is set to download the full git history for the repo

      - name: Get version tag
        id: git_tag
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Download Web UI
        uses: actions/download-artifact@v4
        with:
          name: webui
          path: Shoko.Server/webui

      - name: Replace Sentry DSN and other keys
        shell: pwsh
        run: |
          ./.github/workflows/ReplaceSentryDSN.ps1 -dsn ${{ secrets.SENTRY_DSN }}
          ./.github/workflows/ReplaceTmdbApiKey.ps1 -apiKey ${{ secrets.TMDB_API }}
          ./.github/workflows/ReplaceAVD3URL.ps1 -url ${{ secrets.AVD3_URL }}

      - uses: docker/setup-qemu-action@v3
        name: Set up QEMU
        with:
          platforms: arm64
        if: ${{ matrix.arch == 'arm64' }}

      - uses: docker/setup-buildx-action@v3
        name: Set up Docker Buildx

      - uses: docker/login-action@v3
        name: Log into GitHub Container Registry
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        name: Log into Docker Hub
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Retrieve Commit Date
        id: version
        run: |
          echo "COMMIT_DATE=$(git log -1 --format="%aI")" >> $GITHUB_OUTPUT

      # provenance disabled: docker buildx imagetools create (used in the
      # docker-manual-push_manifest job) does not yet support attestation merging.
      - uses: docker/build-push-action@v6
        name: Build and Push the Docker image
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ secrets.DOCKER_REPO }}:${{ github.event.inputs.tag }}-${{ matrix.arch }}
            ${{ secrets.DOCKER_REPO }}:${{ github.event.inputs.tag }}-${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}
          build-args: |
            version=${{ github.event.inputs.version }}
            channel=${{ github.event.inputs.release }}
            commit=${{ github.sha }}
            date=${{ steps.version.outputs.COMMIT_DATE }}
            tag=${{ steps.git_tag.outputs.tag }}
          provenance: false
          cache-from: type=gha,scope=docker-manual-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-manual-${{ matrix.arch }}

  docker-manual-push_manifest:
    needs: docker-manual-build
    name: Push combined tag for both images
    runs-on: ubuntu-latest

    steps:
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
        name: Set up Docker Buildx

      - uses: docker/login-action@v3
        name: Log into GitHub Container Registry
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        name: Log into Docker Hub
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifest
        env:
          REPO: ${{ secrets.DOCKER_REPO }}
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${REPO}:${{ github.event.inputs.tag }} \
            ghcr.io/${REPO}:${{ github.event.inputs.tag }}-amd64 \
            ghcr.io/${REPO}:${{ github.event.inputs.tag }}-arm64
          docker buildx imagetools create \
            -t ${REPO}:${{ github.event.inputs.tag }} \
            ${REPO}:${{ github.event.inputs.tag }}-amd64 \
            ${REPO}:${{ github.event.inputs.tag }}-arm64

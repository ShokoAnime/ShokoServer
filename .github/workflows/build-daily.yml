name: Build (Daily)

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  current_info:
    runs-on: ubuntu-latest

    name: Current Information

    outputs:
      tag: ${{ steps.release_info.outputs.tag }}
      version: ${{ steps.release_info.outputs.version }}
      version_semver: ${{ steps.semver_info.outputs.version_semver }}
      date: ${{ steps.commit_date_iso8601.outputs.date }}
      sha: ${{ github.sha }}
      sha_short: ${{ steps.release_info.outputs.commit_short }}
      changelog: ${{ steps.generate_changelog.outputs.CHANGELOG }}

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"
          fetch-depth: 0 # This is set to download the full git history for the repo

      - name: Get Commit Date (as ISO8601)
        id: commit_date_iso8601
        shell: bash
        env:
          TZ: UTC0
        run: |
          echo "date=$(git --no-pager show -s --date='format-local:%Y-%m-%dT%H:%M:%SZ' --format=%cd ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Setup Node v20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install NPM Packages
        run: |
          npm install --no-save semver fast-xml-parser

      - name: Read Source Version
        id: read_source_version
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const XML = new (require('fast-xml-parser').XMLParser)();
            const current_version = XML.parse(fs.readFileSync('./Shoko.Server/Shoko.Server.csproj', 'utf-8'))
              .Project
              .PropertyGroup.find(p => 'Version' in p)
              .Version;
            core.setOutput('version', current_version);

      - name: Get Source Version Info
        id: source_version_info
        uses: revam/gh-action-get-tag-and-version@v3
        with:
          use_version: "${{ steps.read_source_version.outputs.version }}"
          prefix: "v"
          prefix_regex: "[vV]?"
          suffix: "dev"
          suffix_regex: "dev"

      - name: Get Currently Tagged Version
        id: tagged_release_info
        uses: revam/gh-action-get-tag-and-version@v3
        with:
          use_branch_history: false
          use_semver: true
          prefix: "v"
          prefix_regex: "[vV]?"
          suffix: "dev"
          suffix_regex: "dev"

      - name: Decide Version And Increment By To Use
        id: decide_version
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const semver = require('semver');
            const source_version = '${{ steps.source_version_info.outputs.version_short }}';
            const tagged_version = '${{ steps.tagged_release_info.outputs.version_short }}';
            const tagged_suffix = '${{ steps.tagged_release_info.outputs.tag_suffix }}';
            // If we're already above the version in the source.
            if (semver.gt(tagged_version, source_version)) {
              // If the tagged version doesn't have a suffix, then we just released a new
              // stable release, so increment the patch and suffix.
              if (!tagged_suffix) {
                core.setOutput('tag_ref', '${{ steps.tagged_release_info.outputs.tag }}');
                core.setOutput('version', '');
                core.setOutput('increment_by', 'patch,suffix');
              }
              // Else, we're still on a daily build.
              else {
                core.setOutput('tag_ref', '${{ steps.tagged_release_info.outputs.tag }}');
                core.setOutput('version', '');
                core.setOutput('increment_by', 'suffix');
              }
            }
            // The currently tagged version matches the source version.
            else if (semver.eq(source_version, tagged_version)) {
              // If it doesn't have a suffix, then we just released a new stable release, so
              // increment the patch and suffix.
              if (!tagged_suffix) {
                core.setOutput('tag_ref', '');
                core.setOutput('version', '${{ steps.source_version_info.outputs.version }}');
                core.setOutput('increment_by', 'patch,suffix');
              }
              // If it does have a suffix, then we're still on a daily build.
              else {
                core.setOutput('tag_ref', '${{ steps.tagged_release_info.outputs.tag }}');
                core.setOutput('version', '');
                core.setOutput('increment_by', 'suffix');
              }
            }
            // Else, we're below the expected version, so increment the base version and suffix.
            else {
              core.setOutput('tag_ref', '');
              core.setOutput('version', source_version);
              core.setOutput('increment_by', 'suffix');
            }

      - name: Get Next Version
        id: release_info
        uses: revam/gh-action-get-tag-and-version@v3
        with:
          use_tag_ref: "${{ steps.decide_version.outputs.tag_ref }}"
          use_version: "${{ steps.decide_version.outputs.version }}"
          increment_by: "${{ steps.decide_version.outputs.increment_by }}"
          prefix: "v"
          prefix_regex: "[vV]?"
          suffix: "dev"
          suffix_regex: "dev"

      - id: semver_info
        name: Set Semver Version
        uses: actions/github-script@v9
        with:
          script: |
            core.setOutput("version_semver", '${{ steps.release_info.outputs.tag }}'.replace(/^[vV]/g, ''));

      - name: Generate Changelog
        id: generate_changelog
        env:
          PREVIOUS_COMMIT: ${{ steps.tagged_release_info.outputs.commit }}
          NEXT_COMMIT: ${{ github.sha }}
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "CHANGELOG<<$EOF" >> "$GITHUB_OUTPUT"
          node .github/workflows/git-log-json.mjs $PREVIOUS_COMMIT..$NEXT_COMMIT | jq -r -f .github/workflows/changelog.jq >> "$GITHUB_OUTPUT"
          echo -e "\n$EOF" >> "$GITHUB_OUTPUT"

  webui:
    runs-on: ubuntu-latest

    name: Download Web UI

    steps:
      - name: Get Latest Web UI Release
        id: webui_release
        run: |
          download_url=$(curl -s https://raw.githubusercontent.com/ShokoAnime/Shoko-WebUI/metadata/manifest.json | jq -r '.Dev[0].downloadUrl')
          echo "download_url=${download_url}" >> "$GITHUB_OUTPUT"

      - name: Download and Extract Web UI
        run: |
          mkdir -p webui
          curl -L "${{ steps.webui_release.outputs.download_url }}" -o webui/latest.zip
          cd webui
          unzip -o latest.zip
          rm latest.zip

      - name: Upload Web UI Artifact
        uses: actions/upload-artifact@v7
        with:
          name: webui
          path: webui/
          retention-days: 1

  offline-importer:
    runs-on: ubuntu-latest

    name: Download Offline Importer Plugin

    steps:
      - name: Get Latest Stable Offline Importer Release
        id: plugin_release
        run: |
          download_url=$(curl -s https://api.github.com/repos/revam/dotnet-shoko-plugin-offline-importer/releases/latest | jq -r '.assets[0].browser_download_url')
          echo "download_url=${download_url}" >> "$GITHUB_OUTPUT"

      - name: Download and Extract Offline Importer
        run: |
          mkdir -p plugins
          curl -L "${{ steps.plugin_release.outputs.download_url }}" -o plugins/latest.zip
          cd plugins
          unzip -o latest.zip
          rm latest.zip

      - name: Upload Offline Importer Artifact
        uses: actions/upload-artifact@v7
        with:
          name: offline-importer
          path: plugins/
          retention-days: 1

  plugin-nuget:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dotnet: ['10.x']

    name: Publish Shoko.Abstractions Nuget

    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Publish Shoko.Abstractions to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          dotnet pack -c Release Shoko.Abstractions/Shoko.Abstractions.csproj
          dotnet nuget push Shoko.Abstractions/bin/Release/*.nupkg \
            --api-key ${{ env.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  queue-nuget:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dotnet: ['10.x']

    name: Publish Shoko.QueueProcessor Nuget

    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Publish Shoko.QueueProcessor to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          dotnet pack -c Release Shoko.QueueProcessor/Shoko.QueueProcessor.csproj
          dotnet nuget push Shoko.QueueProcessor/bin/Release/*.nupkg \
            --api-key ${{ env.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  cli:
    runs-on: ubuntu-latest

    needs:
      - current_info
      - plugin-nuget
      - webui
      - offline-importer

    strategy:
      matrix:
        rid: ['linux-x64', 'linux-arm64', 'osx-arm64']
        dotnet: ['10.x']
        build_type: ['Standalone']
        include:
          - build_type: 'Standalone'
            build_props: '--self-contained true'
          - build_type: 'Framework'
            build_props: '--no-self-contained'
            rid: 'linux-x64'
          - build_type: 'Framework'
            build_props: '--no-self-contained'
            rid: 'linux-arm64'

    name: Build CLI — ${{ matrix.build_type }} ${{ matrix.rid }} (Daily)

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      TMDB_API: ${{ secrets.TMDB_API }}
      AVD3_URL: ${{ secrets.AVD3_URL }}

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"

      - name: Download Web UI
        uses: actions/download-artifact@v8
        with:
          name: webui
          path: Shoko.Server/webui

      - name: Download Offline Importer
        uses: actions/download-artifact@v8
        with:
          name: offline-importer
          path: Shoko.Server/plugins

      - name: Replace Sentry DSN
        if: ${{ env.SENTRY_DSN != '' }}
        shell: pwsh
        run: |
          ./.github/workflows/ReplaceSentryDSN.ps1 -dsn ${{ env.SENTRY_DSN }}

      - name: Replace TMDB API Key
        if: ${{ env.TMDB_API != '' }}
        shell: pwsh
        run: |
          ./.github/workflows/ReplaceTmdbApiKey.ps1 -apiKey ${{ env.TMDB_API }}

      - name: Replace AVD3 URL
        if: ${{ env.AVD3_URL != '' }}
        shell: pwsh
        run: |
          ./.github/workflows/ReplaceAVD3URL.ps1 -url ${{ env.AVD3_URL }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
        if: ${{ matrix.rid == 'linux-arm64' }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ matrix.rid }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            nuget-${{ matrix.rid }}-

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Run dotnet publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} -f net10.0 ${{ matrix.build_props }} Shoko.CLI /p:Version="${{ needs.current_info.outputs.version }}" /p:InformationalVersion="\"channel=dev,commit=${{ needs.current_info.outputs.sha }},tag=${{ needs.current_info.outputs.tag }},date=${{ needs.current_info.outputs.date }},\""

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Shoko.CLI_${{ matrix.build_type }}_${{ matrix.rid }}
          path: Shoko.Server/bin/Release/net10.0/${{matrix.rid}}/publish/

  tray-service-framework-cross:
    runs-on: ubuntu-latest

    needs:
      - current_info
      - plugin-nuget
      - webui
      - offline-importer

    strategy:
      matrix:
        rid: ['linux-x64', 'linux-arm64', 'osx-arm64']
        dotnet: ['10.x']

    name: Build Tray Service — Framework (${{ matrix.rid }}) (Daily)

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      TMDB_API: ${{ secrets.TMDB_API }}
      AVD3_URL: ${{ secrets.AVD3_URL }}

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"

      - name: Download Web UI
        uses: actions/download-artifact@v8
        with:
          name: webui
          path: Shoko.Server/webui

      - name: Download Offline Importer
        uses: actions/download-artifact@v8
        with:
          name: offline-importer
          path: Shoko.Server/plugins

      - name: Replace Sentry DSN
        if: ${{ env.SENTRY_DSN != '' }}
        shell: pwsh
        run: |
          ./.github/workflows/ReplaceSentryDSN.ps1 -dsn ${{ env.SENTRY_DSN }}

      - name: Replace TMDB API Key
        if: ${{ env.TMDB_API != '' }}
        shell: pwsh
        run: |
          ./.github/workflows/ReplaceTmdbApiKey.ps1 -apiKey ${{ env.TMDB_API }}

      - name: Replace AVD3 URL
        if: ${{ env.AVD3_URL != '' }}
        shell: pwsh
        run: |
          ./.github/workflows/ReplaceAVD3URL.ps1 -url ${{ env.AVD3_URL }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
        if: ${{ matrix.rid == 'linux-arm64' }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ matrix.rid }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            nuget-${{ matrix.rid }}-

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Run dotnet publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} -f net10.0 --no-self-contained Shoko.TrayService /p:Version="${{ needs.current_info.outputs.version }}" /p:InformationalVersion="\"channel=dev,commit=${{ needs.current_info.outputs.sha }},tag=${{ needs.current_info.outputs.tag }},date=${{ needs.current_info.outputs.date }},\""

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Shoko.TrayService_Framework_${{ matrix.rid }}
          path: Shoko.Server/bin/Release/net10.0/${{ matrix.rid }}/publish/

  tray-service-windows:
    runs-on: windows-latest

    needs:
      - current_info
      - plugin-nuget
      - webui
      - offline-importer

    strategy:
      matrix:
        dotnet: ['10.x']
        build_type: ['Standalone', 'Framework']
        include:
          - build_props: '--self-contained true'
            build_type: 'Standalone'
          - build_props: ''
            build_type: 'Framework'

    name: Build Tray Service — ${{ matrix.build_type }} (win-x64) (Daily)

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      TMDB_API: ${{ secrets.TMDB_API }}
      AVD3_URL: ${{ secrets.AVD3_URL }}

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"

      - name: Download Web UI
        uses: actions/download-artifact@v8
        with:
          name: webui
          path: Shoko.Server/webui

      - name: Download Offline Importer
        uses: actions/download-artifact@v8
        with:
          name: offline-importer
          path: Shoko.Server/plugins

      - name: Replace Sentry DSN
        if: ${{ env.SENTRY_DSN != '' }}
        shell: pwsh
        run: |
          .\\.github\\workflows\\ReplaceSentryDSN.ps1 -dsn ${{ env.SENTRY_DSN }}

      - name: Replace TMDB API Key
        if: ${{ env.TMDB_API != '' }}
        shell: pwsh
        run: |
          .\\.github\\workflows\\ReplaceTmdbApiKey.ps1 -apiKey ${{ env.TMDB_API }}

      - name: Replace AVD3 URL
        if: ${{ env.AVD3_URL != '' }}
        shell: pwsh
        run: |
          .\\.github\\workflows\\ReplaceAVD3URL.ps1 -url ${{ env.AVD3_URL }}

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Run dotnet publish
        run: dotnet publish -c Release -r win-x64 -f net10.0 ${{ matrix.build_props }} Shoko.TrayService /p:Version="${{ needs.current_info.outputs.version }}" /p:InformationalVersion="channel=dev%2ccommit=${{ needs.current_info.outputs.sha }}%2ctag=${{ needs.current_info.outputs.tag }}%2cdate=${{ needs.current_info.outputs.date }}%2c" # %2c is comma, blame windows/pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Shoko.TrayService_${{ matrix.build_type }}_win-x64
          path: Shoko.Server/bin/Release/net10.0/win-x64/publish/

  tray-service-installer:
    runs-on: windows-2022

    needs:
      - current_info
      - plugin-nuget
      - webui
      - offline-importer

    strategy:
      matrix:
        dotnet: ['10.x']

    name: Build Tray Service — Installer (Daily)

    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      TMDB_API: ${{ secrets.TMDB_API }}
      AVD3_URL: ${{ secrets.AVD3_URL }}

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.ref }}"

      - name: Download Web UI
        uses: actions/download-artifact@v8
        with:
          name: webui
          path: Shoko.Server/webui

      - name: Download Offline Importer
        uses: actions/download-artifact@v8
        with:
          name: offline-importer
          path: Shoko.Server/plugins

      - name: Replace Sentry DSN
        if: ${{ env.SENTRY_DSN != '' }}
        shell: pwsh
        run: |
          .\\.github\\workflows\\ReplaceSentryDSN.ps1 -dsn ${{ env.SENTRY_DSN }}

      - name: Replace TMDB API Key
        if: ${{ env.TMDB_API != '' }}
        shell: pwsh
        run: |
          .\\.github\\workflows\\ReplaceTmdbApiKey.ps1 -apiKey ${{ env.TMDB_API }}

      - name: Replace AVD3 URL
        if: ${{ env.AVD3_URL != '' }}
        shell: pwsh
        run: |
          .\\.github\\workflows\\ReplaceAVD3URL.ps1 -url ${{ env.AVD3_URL }}

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Run dotnet publish
        run: dotnet publish -c Release -r win-x64 --self-contained true Shoko.TrayService /p:Version="${{ needs.current_info.outputs.version }}" /p:InformationalVersion="channel=dev%2ccommit=${{ needs.current_info.outputs.sha }}%2ctag=${{ needs.current_info.outputs.tag }}%2cdate=${{ needs.current_info.outputs.date }}%2c" # %2c is comma, blame windows/pwsh

      - name: Build Installer
        run: iscc /O".\\" ".\\Installer\\ShokoServer.iss"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Shoko.TrayService_Installer_win-x64
          path: Shoko.Setup.exe

  docker-build:
    runs-on: ubuntu-latest

    name: Build and Push Docker Image (Daily)

    needs:
      - current_info
      - cli
      - plugin-nuget
      - queue-nuget

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"

      - name: Download amd64 CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: Shoko.CLI_Framework_linux-x64
          path: publish/amd64/

      - name: Download arm64 CLI artifact
        uses: actions/download-artifact@v8
        with:
          name: Shoko.CLI_Framework_linux-arm64
          path: publish/arm64/

      - name: Replace Sentry DSN and other keys
        shell: pwsh
        run: |
          ./.github/workflows/ReplaceSentryDSN.ps1 -dsn ${{ secrets.SENTRY_DSN }}
          ./.github/workflows/ReplaceTmdbApiKey.ps1 -apiKey ${{ secrets.TMDB_API }}
          ./.github/workflows/ReplaceAVD3URL.ps1 -url ${{ secrets.AVD3_URL }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log into Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-platform Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ secrets.DOCKER_REPO }}:daily
            ${{ secrets.DOCKER_REPO }}:daily
          cache-from: type=registry,ref=ghcr.io/${{ secrets.DOCKER_REPO }}:cache-buildkit
          cache-to: type=registry,ref=ghcr.io/${{ secrets.DOCKER_REPO }}:cache-buildkit,mode=max,image-manifest=true,oci-mediatypes=true
          provenance: true

  add-tag:
    runs-on: ubuntu-latest

    needs:
      - current_info
      - cli
      - tray-service-framework-cross
      - tray-service-windows
      - tray-service-installer
      - docker-build

    name: Add tag for pre-release

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"

      - name: Push pre-release tag
        uses: rickstaa/action-create-tag@v1
        with:
          force_push_tag: true
          tag: ${{ needs.current_info.outputs.tag }}
          message: Shoko Server v${{ needs.current_info.outputs.version }} Pre-Release

  update-manifest:
    runs-on: ubuntu-latest

    needs:
      - current_info
      - add-tag

    name: Update Dev Manifest

    steps:
      - uses: actions/checkout@v7
        with:
          path: master-branch
      - uses: actions/checkout@v7
        with:
          ref: metadata
          path: metadata-branch
      - name: Build entry JSON
        env:
          RELEASE_NOTES: ${{ needs.current_info.outputs.changelog }}
        run: |
          jq -n \
            --arg version "${{ needs.current_info.outputs.version }}" \
            --arg tag "${{ needs.current_info.outputs.tag }}" \
            --arg commit "${{ github.sha }}" \
            --arg downloadUrl "https://github.com/${{ github.repository }}/releases/download/${{ needs.current_info.outputs.tag }}/Shoko.CLI_Framework_any-x64.zip" \
            --arg date "${{ needs.current_info.outputs.date }}" \
            --arg releaseNotes "$RELEASE_NOTES" \
            '{version: $version, tag: $tag, commit: $commit, downloadUrl: $downloadUrl, date: $date, releaseNotes: $releaseNotes}' \
            > /tmp/entry.json
      - name: Update manifest
        run: |
          node master-branch/.github/workflows/update-manifest.mjs \
            "$(pwd)/metadata-branch/manifest.json" \
            "$(cat /tmp/entry.json)" \
            Dev
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "repo(manifest): update dev manifest [skip ci]"
          branch: metadata
          repository: metadata-branch
          file_pattern: manifest.json

  sentry-upload:
    runs-on: ubuntu-latest

    needs:
      - current_info
      - update-manifest

    name: Upload version info to Sentry.io

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"

      # Only add the release to sentry if the build is successful.
      - name: Push Sentry Release "${{ needs.current_info.outputs.version }}"
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # SENTRY_URL: https://sentry.io/
        with:
          environment: 'dev'
          version: ${{ needs.current_info.outputs.version_semver }}

  upload-site:
    runs-on: windows-latest
    continue-on-error: true

    needs:
      - sentry-upload

    name: Upload archive to site

    steps:
      - name: Checkout "${{ github.ref }}"
        uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: Shoko.TrayService_Standalone_win-x64
          path: ShokoServer

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2.8.1
        with:
          key: ${{ secrets.FILES_SSH_KEY }}
          name: files_id_rsa
          known_hosts: ${{ secrets.FILES_KNOWN_HOSTS }}

      - name: Upload daily archive to site
        shell: pwsh
        env:
          SSH_USERNAME: ${{ secrets.FILES_USERNAME }}
          SSH_SERVER: ${{ secrets.FILES_SERVER }}
        run : Compress-Archive .\\ShokoServer .\\ShokoServer.zip && .\\.github\\workflows\\UploadArchive.ps1

  discord-notify:
    runs-on: ubuntu-latest

    name: Send notifications about the new daily build

    needs:
      - current_info
      - sentry-upload

    steps:
      - name: Notify Discord Users
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-color: 5809492
          embed-timestamp: ${{ needs.current_info.outputs.date }}
          embed-author-name: Shoko Server | New Daily Build
          embed-author-icon-url: https://raw.githubusercontent.com/${{ github.repository }}/master/.github/images/Shoko.png
          embed-author-url: https://github.com/${{ github.repository }}
          embed-description: |
            **Version**: `${{ needs.current_info.outputs.version_semver }}` (`${{ needs.current_info.outputs.sha_short }}`)

            Update by grabbing the latest daily from [our site](https://shokoanime.com/downloads/shoko-server) or through Docker using the `ghcr.io/shokoanime/server:daily` tag!

            **Changes since last build**:
            ${{ needs.current_info.outputs.changelog }}

  cleanup-artifacts:
    runs-on: ubuntu-latest

    name: Remove Build Artifacts

    needs:
      - sentry-upload

    steps:
      - name: Remove Web UI Artifact
        uses: geekyeggo/delete-artifact@v6
        with:
          name: webui

      - name: Remove Offline Importer Artifact
        uses: geekyeggo/delete-artifact@v6
        with:
          name: offline-importer
